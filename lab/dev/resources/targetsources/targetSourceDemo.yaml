apiVersion: operator.gnmic.dev/v1alpha1
kind: TargetSource
metadata:
  name: netbox
  namespace: default
spec:
  provider:
    http:
      url: http://srbsci-152.ost.ch:8081/api/dcim/devices/?export=GNMIc_operator_pull
      authorization:
        token:
          scheme: Bearer
          tokenSecretRef:
            name: netbox-api-token
            key: token
      push:
        enabled: true
      interval: 12h
  targetPort: 57400
  targetProfile: default
  targetLabels:
    source: inventory
