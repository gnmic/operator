                            default: false
                            description: Skip TLS verification of the Provider's certificate.
                            type: boolean
                        type: object
                      url:
                        description: |-
                          URL of the HTTP endpoint to pull targets from
                          If defined, the loader will periodically poll this endpoint for targets
                        type: string
                    type: object
                    x-kubernetes-validations:
                    - message: at least one of the fields in [url acceptPush] must
                        be set
                      rule: '[has(self.url),has(self.acceptPush)].filter(x,x==true).size()
                        >= 1'
                type: object
                x-kubernetes-validations:
                - message: exactly one of the fields in [http] must be set
                  rule: '[has(self.http)].filter(x,x==true).size() == 1'
              targetLabels:
                additionalProperties:
                  type: string
                description: Optional labels to apply to all targets discovered by
                  this TargetSource
                type: object
              targetPort:
                description: Optional port to use for discovered targets if not specified
                  by the provider
                format: int32
                type: integer
              targetProfile:
                description: The TargetProfile to use for targets discovered by this
                  TargetSource
                minLength: 1
                type: string
