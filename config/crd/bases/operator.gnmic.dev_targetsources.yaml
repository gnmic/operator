              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: TargetSourceSpec defines the desired state of TargetSource
            properties:
              provider:
                description: |-
                  Provider defines the source of targets for this TargetSource
                  Only one provider can be specified per TargetSource
                properties:
                  http:
                    description: HTTP defines the configuration for a HTTP provider
                    properties:
                      acceptPush:
                        default: false
                        description: |-
                          If true, the loader will accept pushed target updates to the controller endpoint
                          The endpoint will be /{namespace}/{targetsource}/<todo>
                        type: boolean
                      authorization:
                        description: Optional authorization configuration for accessing
                          the HTTP endpoint
                        properties:
                          basic:
                            description: Basic authentication configuration
                            properties:
                              credentialsSecretRef:
                                description: |-
                                  Reference to a Secret containing "username" and "password" keys to use for
                                  basic authentication when connecting to the Provider.
                                  Mutually exclusive with Username and Password.
                                properties:
                                  key:
                                    description: The key of the secret to select from.  Must
                                      be a valid secret key.
                                    type: string
                                  name:
                                    default: ""
                                    description: |-
                                      Name of the referent.
                                      This field is effectively required, but due to backwards compatibility is
                                      allowed to be empty. Instances of this type with an empty value here are
                                      almost certainly wrong.
                                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                                    type: string
                                  optional:
