name: t2

mgmt:
  network: kind

topology:
  defaults:
    kind: nokia_srlinux
    image: ghcr.io/nokia/srlinux:25.10.1

  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:25.10.1
      type: ixr-d2l

  nodes:
    spine1:
      type: ixr-d3l
      mgmt-ipv4: 172.18.1.10

    leaf1:
      mgmt-ipv4: 172.18.1.11
    leaf2:
      mgmt-ipv4: 172.18.1.12

  links:
    - endpoints: ["spine1:e1-1", "leaf1:e1-49"]
    - endpoints: ["spine1:e1-2", "leaf2:e1-49"]
