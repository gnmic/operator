apiVersion: operator.gnmic.dev/v1alpha1
kind: TargetSource
metadata:
  name: http-ts
spec:
  provider:
    http:
      url: http://http-svc.default.svc/targets.json
      interval: 30s
      push:
        enabled: true
        auth:
          bearer:
            tokenSecretRef:
              name: gnmic-api-auth
              key: bearer-token
        signature:
          secretRef:
            name: gnmic-signature
            key: signature
  targetLabels:
    integrationtest: http
  targetProfile: default
