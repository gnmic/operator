openapi: 3.2.0
info:
  title: "gNMIc Operator REST API"
  version: "0.0.1"
paths:
  /plan:
    get:
      summary: "Get cluster plan"
      operationId: "getClusterPlan"
      responses:
        '200':
          description: "ClusterPlan returned"
  /createTargets:
    post:
      summary: "Create targets in the gNMIc Operator"
      operationId: "createTargets"
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Targets'
      responses:
        '201':
          description: "Targets created successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Targets'
        '401':
          description: Access token is missing or invalid

components:
  schemas:
    Targets:
      type: array
      items:
        $ref: '#/components/schemas/Target'
    Label:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
    Target:
      type: object
      required:
        - name
        - address
        - operation
      properties:
        name:
          type: string
        address:
          type: string # in the format "IP:port"
        profile:
          type: string
        labels:
          type: array
          items:
            $ref: '#/components/schemas/Label'
        operation:
          type: string
          enum:
            - created
            - updated
            - deleted
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      